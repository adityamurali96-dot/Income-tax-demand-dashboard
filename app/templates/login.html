<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-100">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — IT Demand Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eff6ff', 100:'#dbeafe', 500:'#3b82f6', 600:'#2563eb', 700:'#1d4ed8', 800:'#1e40af' }
          }
        }
      }
    }
  </script>
</head>
<body class="h-full flex items-center justify-center">
  <div class="w-full max-w-md px-6">
    <!-- Logo -->
    <div class="flex flex-col items-center mb-8">
      <div class="h-14 w-14 rounded-xl bg-brand-600 flex items-center justify-center mb-4">
        <span class="text-white font-bold text-xl">IT</span>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">Income Tax Portal</h1>
      <p class="text-sm text-gray-500 mt-1">Sign in with your incometax.gov.in credentials</p>
    </div>

    <!-- Error message -->
    {% if error %}
    <div class="mb-4 rounded-lg bg-red-50 border border-red-200 p-4">
      <p class="text-sm text-red-700">{{ error }}</p>
    </div>
    {% endif %}

    <!-- Login form -->
    <form method="POST" action="/login" class="bg-white rounded-xl shadow-sm border border-gray-200 p-8 space-y-5">
      <div>
        <label for="pan" class="block text-sm font-medium text-gray-700 mb-1">PAN Number</label>
        <input type="text" id="pan" name="pan" required
               value="{{ pan_value or '' }}"
               maxlength="10" pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}"
               placeholder="ABCDE1234F"
               class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm uppercase
                      focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none
                      placeholder:text-gray-400 placeholder:normal-case">
        <p class="text-xs text-gray-400 mt-1">10-character PAN (e.g., ABCDE1234F)</p>
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="password" name="password" required
               placeholder="Enter your portal password"
               class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm
                      focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none
                      placeholder:text-gray-400">
      </div>

      <button type="submit"
              class="w-full bg-brand-600 text-white py-2.5 px-4 rounded-lg text-sm font-medium
                     hover:bg-brand-700 focus:ring-2 focus:ring-brand-500 focus:ring-offset-2
                     transition-colors">
        Sign In
      </button>
    </form>

    <p class="text-center text-xs text-gray-400 mt-6">
      Your credentials are used to log into incometax.gov.in.<br>
      They are not stored on our servers.
    </p>
  </div>
</body>
</html>
